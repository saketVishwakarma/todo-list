apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: todo-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/saketVishwakarma/todo-list.git
    targetRevision: HEAD
    path: k8s/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: todo-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true